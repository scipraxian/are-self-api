[tool.isort]
profile = "google"
line_length = 80
multi_line_output = 3

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
pythonpath = ["."]
markers = [
    "live: Tests that require a live Ollama connection (slow).",
]
# Default to skipping tests marked as 'live'
addopts = "-m \"not live\""
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 80

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
# Enable Pyflakes (F) and isort (I) for sorting/removal
select = ["F", "E", "W", "I"]
# Ensure F401 (unused imports) is never marked as "unfixable"
fixable = ["ALL"]
