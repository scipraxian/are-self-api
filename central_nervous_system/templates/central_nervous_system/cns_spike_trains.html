{% load static %}
<!DOCTYPE html>
<html lang="en">
<spike>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Sandbox | API-Driven UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@700;800&family=JetBrains+Mono&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'central_nervous_system/css/cns_spike.css' %}">
    <link rel="stylesheet" href="{% static 'central_nervous_system/css/cns_spike_train_control_card.css' %}">
    <link rel="stylesheet" href="{% static 'central_nervous_system/css/cns_spike_train.css' %}">
    <link rel="stylesheet" href="{% static 'central_nervous_system/css/cns_spike_trains.css' %}">
</spike>
<body>
<script>
    window.djangoContext = {csrfToken: "{{ csrf_token }}"};
</script>

<div class="sandbox-container">
    <header class="sandbox-header">
        <h1>TALOS SPAWN SANDBOX</h1>
        <div class="status-indicator">
            <span class="pulse-dot"></span> System Online
        </div>
    </header>

    <main id="spike_trains-dispatcher-root" class="spike_trains-list"></main>
</div>

<template id="tpl-cns-spike">
    <a href="#" class="cns-spike-card js-cns-spike">
        <div class="spike-header">
            <div class="spike-name js-spike-name">Unknown Node</div>
            <div class="card-drill-btn" title="View Logs">☍</div>
        </div>
        <div class="spike-meta">
            <span class="spike-target js-spike-target">LOCAL</span>
            <span class="spike-time js-spike-time">--:--:--</span>
        </div>
        <div class="spike-footer">
            <span class="spike-log js-spike-log">Waiting...</span>
            <span class="spike-duration js-spike-duration">⏱ 0s</span>
        </div>
    </a>
</template>

<template id="tpl-cns-spike_train">
    <div class="cns-spike_train-wrapper js-cns-spike_train-wrapper">
        <div class="cns-spike_train js-cns-spike_train">

            <div class="spike_train-header">
                <div class="spike_train-title js-spike_train-title">Unknown Protocol</div>
                <div class="spike_train-status">
                    <span class="js-spike_train-id">#00000000</span>
                    <span class="status-text js-spike_train-status-text">Pending</span>
                </div>
                <div class="spike_train-time js-spike_train-time">Just now</div>
            </div>

            <div class="cns-control-card js-cns-control-card">
                <a href="#" class="btn-control js-btn-monitor" title="Monitor Graph">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </a>
                <a href="#" class="btn-control js-btn-edit" title="Edit Protocol">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </a>
                <button class="btn-control js-action-btn stop js-btn-stop" style="display: none;" title="Stop">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect>
                    </svg>
                </button>
                <button class="btn-control js-action-btn rerun js-btn-rerun" style="display: none;" title="Re-Run">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
            </div>

            <button class="scroll-btn left js-scroll-left" style="display: none;">◄</button>

            <div class="spike_train-track js-spike_train-track">
            </div>

            <button class="scroll-btn right js-scroll-right" style="display: none;">►</button>
        </div>

        <div class="nested-spike_trains js-nested-spike_trains"></div>
    </div>
</template>

<script src="{% static 'central_nervous_system/js/cns_spike.js' %}"></script>
<script src="{% static 'central_nervous_system/js/cns_spike_train_control_card.js' %}"></script>
<script src="{% static 'central_nervous_system/js/cns_spike_train.js' %}"></script>
<script src="{% static 'central_nervous_system/js/cns_spike_trains.js' %}"></script>
</body>
</html>
