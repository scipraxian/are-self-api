<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Side-by-Side Xterm Views</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="central_nervous_system/static/central_nervous_system/css/side_by_side.css" />
</head>

<body>

    <header>
        <input type="text" id="sourceUrl" placeholder="File URL (Simulated if empty)" />
        <button onclick="addTerminal()">+ Add Terminal View</button>
        <div style="flex-grow:1"></div>
        <small style="color: #aaa">Polling Interval: 2s</small>
    </header>

    <div id="terminal-container">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="central_nervous_system/static/central_nervous_system/js/side_by_side.js"></script>

</body>

</html>
