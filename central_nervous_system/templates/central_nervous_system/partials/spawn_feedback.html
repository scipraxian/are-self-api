<div class="cns-feedback" style="background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #f0fdf4; padding: 1rem; border-radius: 8px; margin-top: 1rem; animation: slideDown 0.3s ease-out;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 1.5rem;">🐉</span>
        <div>
            <strong style="display: block; font-size: 1.1rem; color: #4ade80;">CNS Protocol Initiated</strong>
            <span style="font-family: monospace; font-size: 0.9rem; color: #86efac;">Spawn ID: {{ spawn.id }}</span>
        </div>
    </div>
    <div style="margin-top: 0.5rem; font-size: 0.85rem; color: #bbf7d0;">
        Status: <span style="font-weight: 700; text-transform: uppercase;">{{ spawn.status.name }}</span>
    </div>
</div>
