<div class="hydra-error" style="background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; padding: 1rem; border-radius: 8px; margin-top: 1rem;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 1.5rem;">⚠️</span>
        <div>
            <strong style="display: block; font-size: 1.1rem; color: #f87171;">Hydra Launch Error</strong>
            <span style="font-family: monospace; font-size: 0.9rem;">{{ message }}</span>
        </div>
    </div>
</div>
