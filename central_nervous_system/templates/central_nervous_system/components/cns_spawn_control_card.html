<div id="control-card-{{ spawn.id }}"
     class="cns-control-card js-cns-control-card {% if spawn.is_alive %}active-state{% endif %}"
     data-spawn-id="{{ spawn.id }}"
     data-spellbook-id="{{ spawn.spellbook.id }}">

    <a href="{% url 'central_nervous_system:graph_monitor' spawn.id %}?full=True" class="btn-control" title="Monitor Graph">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
        </svg>
    </a>

    <a href="{% url 'central_nervous_system:graph_editor' spawn.spellbook.id %}" class="btn-control" title="Edit Protocol">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
    </a>

    <button class="btn-control js-action-btn stop" style="{% if not spawn.is_alive %}display: none;{% endif %}"
            title="Stop">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect>
        </svg>
    </button>

    <button class="btn-control js-action-btn rerun" style="{% if spawn.is_alive %}display: none;{% endif %}"
            title="Re-Run">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
    </button>
</div>
