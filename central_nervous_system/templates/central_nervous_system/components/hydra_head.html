<a href="{% url 'central_nervous_system:head_detail' head.id %}"
   id="head-{{ head.id }}"
   class="hydra-head-card js-hydra-head status-{{ head.status.name|lower }}"
   data-head-id="{{ head.id }}"
   data-is-alive="{{ head.is_alive|yesno:'true,false' }}">

    <div class="head-header">
        <div class="head-name">{{ head.spell.name|default:"Unknown Node" }}</div>
        <div class="card-drill-btn" title="View Logs">☍</div>
    </div>

    <div class="head-meta">
        <span class="head-target js-head-target">{{ head.target.hostname|default:"LOCAL" }}</span>
        <span class="head-time">{{ head.created|date:"H:i:s" }}</span>
    </div>

    <div class="head-footer">
        <span class="head-log js-head-log">
            {% if head.is_queued %}
                Waiting...
            {% else %}
                {{ head.application_log|slice:"-30:"|default:head.status.name }}
            {% endif %}
        </span>
        <span class="head-duration js-head-duration">⏱ {{ head.duration|default:"0s" }}</span>
    </div>
</a>
