<a href="{% url 'central_nervous_system:head_detail' spike.id %}"
   id="spike-{{ spike.id }}"
   class="cns-spike-card js-cns-spike status-{{ spike.status.name|lower }}"
   data-spike-id="{{ spike.id }}"
   data-is-alive="{{ spike.is_alive|yesno:'true,false' }}">

    <div class="spike-header">
        <div class="spike-name">{{ spike.effector.name|default:"Unknown Node" }}</div>
        <div class="card-drill-btn" title="View Logs">☍</div>
    </div>

    <div class="spike-meta">
        <span class="spike-target js-spike-target">{{ spike.target.hostname|default:"LOCAL" }}</span>
        <span class="spike-time">{{ spike.created|date:"H:i:s" }}</span>
    </div>

    <div class="spike-footer">
        <span class="spike-log js-spike-log">
            {% if spike.is_queued %}
                Waiting...
            {% else %}
                {{ spike.application_log|slice:"-30:"|default:spike.status.name }}
            {% endif %}
        </span>
        <span class="spike-duration js-spike-duration">⏱ {{ spike.duration|default:"0s" }}</span>
    </div>
</a>
