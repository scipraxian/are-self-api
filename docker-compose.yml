services:
  # 1. The Database (With Vector Hardware)
  db:
    image: pgvector/pgvector:pg16
    container_name: are_self_db
    restart: always
    environment:
      POSTGRES_DB: postgres_talos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Wingsofbronze223
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Nervous System (Task Queue)
  redis:
    # Pinned to 7.4.2-alpine for CVE-2025-49844 (CVSS 10.0) — RCE in the
    # Redis server Lua scripting engine. `image: redis` floats to `:latest`
    # on Docker Hub, which is why we pin. Alpine base keeps the image small.
    image: redis:7.4.2-alpine
    container_name: are_self_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. The Gateway (Reverse Proxy)
  #
  # NGINX sits in front of Daphne, handling TLS termination and
  # proxying all traffic including the /mcp endpoint.
  #
  # TLS mode (automatic):
  #   - Drop cert.pem + key.pem into nginx/certs/
  #   - Restart: docker compose restart nginx
  #   - HTTPS on port 443, HTTP redirect on 80
  #
  # HTTP mode (default):
  #   - No certs? Runs plain HTTP on port 80. Just works.
  #
  nginx:
    image: nginx:alpine
    container_name: are_self_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      # Custom landing page served at exactly `/` by the entrypoint-generated
      # config. Everything else still proxies to Daphne / Vite.
      - ./nginx/html:/usr/share/nginx/html:ro
      # Mounted as a plain file (not into /docker-entrypoint.d/) because
      # Windows bind mounts don't preserve the Linux exec bit, and nginx's
      # entrypoint scanner ignores non-executable files. We sh the script
      # ourselves in the entrypoint override below.
      #
      # We do NOT mount anything into /etc/nginx/templates/ because the
      # stock nginx image's 20-envsubst-on-templates.sh would run AFTER
      # our detect script and clobber its output. Our detect script writes
      # the final default.conf directly — it is the source of truth.
      - ./nginx/entrypoint.sh:/detect-certs.sh:ro
    entrypoint: ["/bin/sh", "-c", "sh /detect-certs.sh && exec /docker-entrypoint.sh nginx -g 'daemon off;'"]
    environment:
      # host.docker.internal resolves to the host machine on
      # Docker Desktop (Windows/Mac). On Linux, use extra_hosts.
      - DAPHNE_HOST=host.docker.internal
      - DAPHNE_PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
