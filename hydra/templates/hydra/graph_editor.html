{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Graph Editor | Visual Logic</title>
    <link rel="stylesheet" href="{% static 'hydra/css/graph_editor.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap"
          rel="stylesheet">
</head>

<body>
<script>
    window.djangoContext = {
        bookId: "{{ book.id }}",
        spawnId: "{{ spawn_id|default:'' }}",
        mode: "{{ mode|default:'edit' }}",
        csrfToken: "{{ csrf_token }}"
    };
</script>
<div id="app">
    <header class="top-bar">
        <a href="{% url 'home' %}" class="logo" style="text-decoration: none; color: inherit;">
            <span class="icon">⚡</span>
            <span class="title">TALOS_GRAPH</span>
        </a>
        <div class="execution-controls">
            <button id="start-btn" class="btn play-btn">▶ Start</button>
            <button id="stop-btn" class="btn stop-btn" disabled>■ Stop</button>
            <div id="execution-status-container">
                <span id="execution-status-text">Ready</span>
                <div id="execution-status-indicator" class="ready"></div>
            </div>
        </div>
        <div class="actions">
            <a href="{% url 'home' %}" class="btn primary"
               style="text-decoration: none; display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 16px;">🏠</span> Dashboard
            </a>
            <button id="auto-layout-btn" class="btn secondary">Auto Layout</button>
            <button id="export-json-btn" class="btn secondary">Export JSON</button>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <input type="text" id="node-search" placeholder="Search nodes...">
            </div>
            <div class="node-library" id="node-library">
                <div class="category">
                    <span>Logic</span>
                    <div class="library-item" draggable="true" data-type="Branch">Branch</div>
                    <div class="library-item" draggable="true" data-type="Delay">Delay</div>
                </div>
                <div class="category">
                    <span>Talos</span>
                    <div class="library-item" draggable="true" data-type="Execute">Execute Build</div>
                    <div class="library-item" draggable="true" data-type="Log">Print Log</div>
                    <div class="library-item" draggable="true" data-type="Notify">Send Notify</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="view-toggle" class="icon-btn" title="Toggle View Mode">👁</button>
            </div>
        </aside>

        <main id="editor-container">
            <!-- Grid Background -->
            <div id="canvas-grid" class="canvas-layer"></div>

            <!-- Link Layer (SVG) -->
            <svg id="svg-layer" class="canvas-layer">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
                            orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="context-fill"/>
                    </marker>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                </defs>
                <g id="connections-group"></g>
                <path id="temp-line" class="temp-wire" d="" fill="none" style="display: none;"></path>
            </svg>

            <!-- Node Layer -->
            <div id="nodes-layer" class="canvas-layer"></div>
        </main>
    </div>

    <footer class="status-bar">
        <div class="status-item">Nodes: <span id="node-count">0</span></div>
        <div class="status-item">Connections: <span id="conn-count">0</span></div>
        <div class="status-item hint">Right-click wire to delete | Drag header to move</div>
    </footer>
</div>

<!-- JSON Preview Modal -->
<div id="modal-container" class="modal-overlay" style="display: none;">
    <div class="modal">
        <div class="modal-header">
            <h3>Export Graph JSON</h3>
            <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <pre id="json-preview"></pre>
        </div>
        <div class="modal-footer">
            <button id="copy-json" class="btn primary">Copy to Clipboard</button>
        </div>
    </div>
</div>


<script src="{% static 'hydra/js/graph_editor.js' %}"></script>
</body>

</html>
