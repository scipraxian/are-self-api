{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Sandbox | API-Driven UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@700;800&family=JetBrains+Mono&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'hydra/css/hydra_head.css' %}">
    <link rel="stylesheet" href="{% static 'hydra/css/hydra_spawn_control_card.css' %}">
    <link rel="stylesheet" href="{% static 'hydra/css/hydra_spawn.css' %}">
    <link rel="stylesheet" href="{% static 'hydra/css/hydra_spawns.css' %}">
</head>
<body>
<script>
    window.djangoContext = {csrfToken: "{{ csrf_token }}"};
</script>

<div class="sandbox-container">
    <header class="sandbox-header">
        <h1>TALOS SPAWN SANDBOX</h1>
        <div class="status-indicator">
            <span class="pulse-dot"></span> System Online
        </div>
    </header>

    <main id="spawns-dispatcher-root" class="spawns-list"></main>
</div>

<template id="tpl-hydra-head">
    <a href="#" class="hydra-head-card js-hydra-head">
        <div class="head-header">
            <div class="head-name js-head-name">Unknown Node</div>
            <div class="card-drill-btn" title="View Logs">☍</div>
        </div>
        <div class="head-meta">
            <span class="head-target js-head-target">LOCAL</span>
            <span class="head-time js-head-time">--:--:--</span>
        </div>
        <div class="head-footer">
            <span class="head-log js-head-log">Waiting...</span>
            <span class="head-duration js-head-duration">⏱ 0s</span>
        </div>
    </a>
</template>

<template id="tpl-hydra-spawn">
    <div class="hydra-spawn-wrapper js-hydra-spawn-wrapper">
        <div class="hydra-spawn js-hydra-spawn">

            <div class="spawn-header">
                <div class="spawn-title js-spawn-title">Unknown Protocol</div>
                <div class="spawn-status">
                    <span class="js-spawn-id">#00000000</span>
                    <span class="status-text js-spawn-status-text">Pending</span>
                </div>
                <div class="spawn-time js-spawn-time">Just now</div>
            </div>

            <div class="hydra-control-card js-hydra-control-card">
                <a href="#" class="btn-control js-btn-monitor" title="Monitor Graph">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </a>
                <a href="#" class="btn-control js-btn-edit" title="Edit Protocol">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </a>
                <button class="btn-control js-action-btn stop js-btn-stop" style="display: none;" title="Stop">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect>
                    </svg>
                </button>
                <button class="btn-control js-action-btn rerun js-btn-rerun" style="display: none;" title="Re-Run">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
            </div>

            <button class="scroll-btn left js-scroll-left" style="display: none;">◄</button>

            <div class="spawn-track js-spawn-track">
            </div>

            <button class="scroll-btn right js-scroll-right" style="display: none;">►</button>
        </div>

        <div class="nested-spawns js-nested-spawns"></div>
    </div>
</template>

<script src="{% static 'hydra/js/hydra_head.js' %}"></script>
<script src="{% static 'hydra/js/hydra_spawn_control_card.js' %}"></script>
<script src="{% static 'hydra/js/hydra_spawn.js' %}"></script>
<script src="{% static 'hydra/js/hydra_spawns.js' %}"></script>
</body>
</html>
