<div class="log-interface" style="background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); text-align: left;">
    <div class="log-tabs" style="display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);">
        <button class="log-tab {% if log_type == 'tool' %}active{% endif %}" 
                hx-get="{% url 'hydra_head_logs' head.id %}?type=tool&partial=content" 
                hx-target="#log-payload-{{ head.id }}" 
                hx-swap="innerHTML"
                onclick="setActiveTab(this)">
            Output Stream
        </button>
        
        <button class="log-tab {% if log_type == 'system' %}active{% endif %}" 
                hx-get="{% url 'hydra_head_logs' head.id %}?type=system&partial=content" 
                hx-target="#log-payload-{{ head.id }}" 
                hx-swap="innerHTML"
                onclick="setActiveTab(this)">
            System Context
        </button>
    </div>
    
    <div class="log-content-box" style="padding: 1rem; max-height: 400px; overflow-y: auto;">
        <div id="log-payload-{{ head.id }}" 
             style="margin: 0; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #cbd5e1;"
             hx-get="{% url 'hydra_head_logs' head.id %}?type={{ log_type }}&partial=content" 
             hx-trigger="every 2s" 
             hx-swap="innerHTML"
             hx-on::after-swap="this.parentElement.scrollTop = this.parentElement.scrollHeight;">
{{ content }}
        </div>
    </div>
</div>

<script>
    function setActiveTab(btn) {
        var tabs = btn.parentElement.children;
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].classList.remove('active');
        }
        btn.classList.add('active');
    }
</script>

<style>
    .log-tab { background: transparent; border: none; color: #64748b; padding: 0.75rem 1.5rem; cursor: pointer; font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .log-tab:hover { color: #f1f5f9; background: rgba(255,255,255,0.05); }
    .log-tab.active { color: #60a5fa; border-bottom-color: #60a5fa; background: rgba(96, 165, 250, 0.1); }
</style>
