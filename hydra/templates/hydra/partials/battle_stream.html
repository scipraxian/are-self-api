<script>
    document.getElementById('initial-loader')?.remove();
</script>

{% for event in events %}
    <div class="log-row source-{{ event.source }}">
        <div class="col-msg col-local">{% if event.local_msg %}{{ event.local_msg }}{% endif %}</div>
        <div class="col-ts">{{ event.display_ts }}</div>
        <div class="col-msg col-remote">{% if event.remote_msg %}{{ event.remote_msg }}{% endif %}</div>
    </div>
{% endfor %}

<div id="battle-station-cursors" hx-swap-oob="true"
     data-local="{{ new_local_cursor|default:0 }}"
     data-remote="{{ new_remote_cursor|default:0 }}">
</div>

{% if not is_active %}
    <div id="stream-end-marker" class="log-row" style="border-bottom: none; margin-top: 20px;">
        <div class="col-msg"
             style="grid-column: 1 / -1; text-align: center; color: #4ade80; font-weight: bold; background: rgba(34, 197, 94, 0.1); padding: 10px;">
            MISSION COMPLETE - LOG STREAM FINALIZED
        </div>
    </div>
    <script>
        (function () {
            const container = document.getElementById('battle-stream-container');
            if (container) {
                container.removeAttribute('hx-trigger');
                htmx.process(container);
                console.log("Battle Station: Polling stopped.");
            }
        })();
    </script>
{% endif %}
