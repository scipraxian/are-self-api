{% extends "dashboard/base.html" %}

{% block title %}Hydra Monitor: {{ spawn.spellbook.name }}{% endblock %}

{% block extra_style %}
    <style>
        /* --- 1. RESET THE PAGE LAYOUT --- */
        body {
            display: block !important;
            padding: 0 !important;
            margin: 0 !important;
            height: 100vh !important;
            width: 100vw !important;
            overflow: hidden !important;
            background: #0f172a !important;
        }

        .container {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            margin: 0 !important;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            text-align: left !important;

            /* SPACING FIX: 100px top clears Neural Monitor (40px) + Admin Buttons (40px) */
            padding: 100px 20px 0 20px !important;
            box-sizing: border-box !important;
        }

        /* --- 2. ADMIN BUTTONS POSITIONING --- */
        .top-actions {
            position: absolute !important;
            /* Move below the fixed Neural Monitor header */
            top: 60px !important;
            right: 20px !important;
            z-index: 9999 !important;
        }

        /* --- 3. BATTLE STATION LAYOUT --- */
        #hydra-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin: 0 !important;
            padding: 0 !important;
            max-width: none !important;
        }

        .multiplayer-battle-station {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
            background: #020617;
            overflow: hidden;
            border-radius: 8px;
        }

        /* --- 4. HEADER --- */
        .battle-station-header {
            flex-shrink: 0;
            height: 50px;
            display: grid;
            grid-template-columns: 1fr 140px 1fr 300px;
            align-items: center;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }

        .header-col {
            padding: 0 12px;
            font-weight: 700;
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-col.center {
            text-align: center;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            padding-right: 15px;
            height: 100%;
        }

        #battle-filter {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            width: 150px;
            transition: width 0.2s;
        }

        #battle-filter:focus {
            width: 200px;
            border-color: #60a5fa;
            outline: none;
        }

        /* --- 5. STREAM & LOGS --- */
        .battle-stream {
            flex: 1;
            overflow-y: auto !important;
            background: #020617;
            padding-bottom: 2rem;
        }

        .log-row {
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'JetBrains Mono', Consolas, monospace;
            font-size: 11px;
            line-height: 1.4;
            width: 100%;
        }

        .log-row.filtered-out {
            display: none !important;
        }

        .log-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* --- 6. TEXT FORMATTING (Fixed) --- */
        .col-msg {
            padding: 4px 10px;
            word-break: break-word;
            white-space: pre-wrap;
            color: #cbd5e1;
            align-self: start;
        }

        .col-ts {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            color: #58a6ff;
            font-size: 10px;
            padding: 4px 0;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0.7;
        }

        /* --- COLORS --- */
        .source-local .col-local {
            color: #e6edf3;
        }

        .source-remote .col-remote {
            color: #d2a8ff;
        }

        .source-merged {
            background: rgba(255, 255, 255, 0.01);
        }

        .source-merged .col-local {
            border-left: 3px solid #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .source-merged .col-remote {
            border-left: 3px solid #a855f7;
            background: rgba(168, 85, 247, 0.05);
        }

        .source-merged .col-ts {
            color: #f2cc60;
            font-weight: 700;
            background: rgba(251, 191, 36, 0.05);
        }

        /* Toggle */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 18px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #60a5fa;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(14px);
        }

        .toggle-label {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 8px;
        }
    </style>
{% endblock %}

{% block main_content %}
    <div id="hydra-controls">
        {% include "hydra/spawn_monitor.html" with is_full_page=True %}
    </div>
{% endblock %}

{% block extra_script %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const filterInput = document.getElementById('battle-filter');
            let currentFilter = "";
            let debounceTimer;

            function applyFilter() {
                requestAnimationFrame(() => {
                    const rows = document.querySelectorAll('.log-row');

                    if (!currentFilter) {
                        rows.forEach(r => r.classList.remove('filtered-out'));
                        return;
                    }

                    const term = currentFilter.toLowerCase();
                    const isNegative = term.startsWith('-');
                    const cleanTerm = isNegative ? term.substring(1) : term;

                    rows.forEach(row => {
                        const text = row.textContent.toLowerCase();
                        let shouldShow = true;
                        if (isNegative) {
                            if (text.includes(cleanTerm)) shouldShow = false;
                        } else {
                            if (!text.includes(cleanTerm)) shouldShow = false;
                        }

                        if (shouldShow) row.classList.remove('filtered-out');
                        else row.classList.add('filtered-out');
                    });
                });
            }

            if (filterInput) {
                filterInput.addEventListener('keyup', (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        currentFilter = e.target.value.trim();
                        applyFilter();
                    }, 200);
                });
            }

            document.body.addEventListener('htmx:afterSwap', (evt) => {
                if (evt.target.id === 'battle-stream-container' && currentFilter) {
                    applyFilter();
                }
            });
        });
    </script>
{% endblock %}
