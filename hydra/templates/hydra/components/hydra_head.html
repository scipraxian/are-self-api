<a href="{% url 'hydra:head_detail' head.id %}"
   id="head-{{ head.id }}"
   class="hydra-head-card status-{{ head.status.name|lower }}"
        {% if head.is_alive %}
   hx-get="{% url 'hydra:head_component' head.id %}"
   hx-trigger="every 1.5s"
   hx-swap="outerHTML"
        {% endif %}>

    <div class="head-header">
        <div class="head-name">{{ head.spell.name|default:"Unknown Node" }}</div>
        <div class="card-drill-btn" title="View Logs">☍</div>
    </div>

    <div class="head-meta">
        <span class="head-target">{{ head.target.hostname|default:"LOCAL" }}</span>
        <span class="head-time">{{ head.created|date:"H:i:s" }}</span>
    </div>

    <div class="head-footer">
        <span class="head-log">
            {% if head.is_queued %}
                Waiting...
            {% else %}
                {{ head.spell_log|slice:"-30:"|default:head.status.name }}
            {% endif %}
        </span>
        <span class="head-duration">⏱ {{ head.duration|default:"0s" }}</span>
    </div>
</a>
