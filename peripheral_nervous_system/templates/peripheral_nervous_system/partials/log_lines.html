{% for line in lines %}
<div class="log-line" style="white-space: pre-wrap; margin-bottom: 2px;">{{ line }}</div>
{% empty %}
<div class="log-line" style="color: #555;">(Wait for logs...)</div>
{% endfor %}

<script>
    // Scroll to bottom
    const logOutput = document.getElementById('log-output');
    if (logOutput) {
        logOutput.scrollTop = logOutput.scrollHeight;
    }
</script>
