<div id="neural-monitor"
     hx-get="{% url 'neural_status' %}"
     hx-trigger="every 5s"
     hx-swap="outerHTML"
     style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 2rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            color: #94a3b8; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(8px);">

    {% if thought %}
        <span style="width: 8px; height: 8px; border-radius: 50%; display: inline-block;
              {% if thought.status.name == 'Thinking' %}
                  background: #eab308; box-shadow: 0 0 8px #eab308; animation: pulse 2s infinite;
              {% elif thought.status.name == 'Done' %}
                  background: #4ade80; box-shadow: 0 0 5px #4ade80;
              {% else %}
                  background: #64748b;
              {% endif %}">
        </span>

        <span style="color: #f1f5f9; font-weight: 700; letter-spacing: 0.05em;">TALOS:</span>

        <span style="color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw;">
            {{ thought.current_thought }}
        </span>

        <span style="margin-left: auto; font-size: 0.75rem; opacity: 0.5;">
            {{ thought.created|timesince }} ago
        </span>
    {% else %}
        <span style="width: 8px; height: 8px; border-radius: 50%; background: #334155;"></span>
        <span style="opacity: 0.5;">Neural Core Online. Standing by.</span>
    {% endif %}
</div>
