<div id="chat-sidebar" class="chat-sidebar">
    <div class="chat-toggle" onclick="document.getElementById('chat-sidebar').classList.toggle('open')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>OVERRIDE</span>
    </div>
    
    <div class="chat-container">
        <div class="chat-header">
            <h3>Frontal Lobe</h3>
            <div id="chat-indicator" class="htmx-indicator">
                <div class="loading-ring"></div>
            </div>
        </div>

        <div id="chat-history" class="chat-history">
            <div class="chat-message system">
                <span class="text">Talos Chat</span>
            </div>
            {% for msg in history %}
                {% if msg.type == 'user' %}
                    <div class="chat-message user">
                        <span class="sender">User</span>
                        <div class="text">{{ msg.text }}</div>
                    </div>
                {% else %}
                    <div class="chat-message ai">
                        <span class="sender">AI</span>
                        <div class="text">{{ msg.text|linebreaksbr }}</div>
                        <div class="metrics">Restored from Memory</div>
                    </div>
                {% endif %}
            {% endfor %}
        </div>

        <div class="chat-input-area">
            <form id="chat-form" 
                  hx-post="{% url 'talos_frontal:chat_override' %}" 
                  hx-swap="none"
                  hx-indicator="#chat-indicator">
                {% csrf_token %}
                <input type="hidden" name="session_id" id="chat-session-id" value="">

                <input type="text" name="message" id="chat-input-field" placeholder="Send prompt..." required autocomplete="off">
                <button type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('chat-form');
        const history = document.getElementById('chat-history');
        const input = document.getElementById('chat-input-field');
        const sessionInput = document.getElementById('chat-session-id');

        form.addEventListener('htmx:beforeRequest', function(evt) {
            const message = input.value.trim();
            if (!message) {
                evt.preventDefault();
                return;
            }

            const userMsg = document.createElement('div');
            userMsg.className = 'chat-message user';
            userMsg.innerHTML = '<span class="sender">User</span><div class="text">' +
                                message.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") +
                                '</div>';
            history.appendChild(userMsg);
            history.scrollTop = history.scrollHeight;
        });

        form.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.successful) {
                const data = JSON.parse(evt.detail.xhr.responseText);

                // NEW: LOCK SESSION ID
                if (data.session_id) {
                    sessionInput.value = data.session_id;
                }

                const aiMsg = document.createElement('div');
                aiMsg.className = 'chat-message ai';
                const formattedContent = data.response.replace(/\n/g, '<br>');

                aiMsg.innerHTML = `
                    <span class="sender">AI</span>
                    <div class="text">${formattedContent}</div>
                    <div class="metrics">${data.tokens_input} in / ${data.tokens_output} out (${data.model})</div>
                `;

                history.appendChild(aiMsg);
                // Clear text but KEEP session_id
                input.value = "";
                history.scrollTop = history.scrollHeight;
            } else {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'chat-message system error';
                errorMsg.innerHTML = `<span class="text">ERROR: ${evt.detail.xhr.statusText}</span>`;
                history.appendChild(errorMsg);
            }
        });
    })();
</script>
