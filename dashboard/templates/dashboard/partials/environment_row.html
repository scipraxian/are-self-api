<div class="launch-row">
    <div style="width: 25px; display: flex; justify-content: center; align-items: center;">
        {% if env.selected %}
            <span style="color: var(--lcars-elbow); font-size: 0.8rem;">●</span>
        {% endif %}
    </div>

    <button
            hx-post="{% url 'environments:select_environment' env.id %}"
            hx-target="body"
            class="launch-btn"
            style="{% if env.selected %}background-color: var(--lcars-elbow); color: #000; border-left: 4px solid #fff; box-shadow: 0 0 15px rgba(249, 159, 27, 0.3);{% else %}background-color: rgba(255, 255, 255, 0.05); color: #666; border-left: 4px solid #333;{% endif %}"
            onmouseover="if(!this.classList.contains('active-env')) { this.style.backgroundColor='rgba(255,255,255,0.1)'; this.style.color='#fff'; }"
            onmouseout="if(!this.classList.contains('active-env')) { this.style.backgroundColor='rgba(255,255,255,0.05)'; this.style.color='#666'; }">
        {{ env.name }}
    </button>

    <a href="{% url 'admin:environments_projectenvironment_change' env.id %}"
       class="edit-btn"
       target="_blank"
       title="Edit Environment">
        ✎
    </a>
</div>
